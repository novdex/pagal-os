<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PAGAL OS{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <!-- PWA Support -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#6c5ce7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <!-- Top Bar — minimal: logo + search + notifications -->
    <header class="topbar">
        <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Menu">&#9776;</button>
        <a href="/" class="topbar-brand">
            <span class="logo-icon">&#x1F9E0;</span>
            <span class="logo-text">PAGAL OS</span>
        </a>
        <div class="topbar-spacer"></div>
        <!-- Notification Bell -->
        <div id="notif-bell" class="topbar-notif" onclick="toggleNotifDropdown()">
            <span>&#x1F514;</span>
            <span id="notif-badge" class="notif-badge" style="display:none;">0</span>
            <div id="notif-dropdown" class="notif-dropdown" style="display:none;">
                <div class="notif-header">
                    <strong>Notifications</strong>
                    <button onclick="markAllNotifRead(event)">Mark all read</button>
                </div>
                <div id="notif-list"></div>
            </div>
        </div>
        <a href="/settings" class="topbar-icon" title="Settings">&#x2699;</a>
    </header>

    <!-- Sidebar — grouped navigation -->
    <aside class="sidebar" id="sidebar">
        <nav class="sidebar-nav">
            <div class="nav-group">
                <div class="nav-group-label">Agents</div>
                <a href="/" class="nav-item {% block nav_dashboard %}{% endblock %}">
                    <span class="nav-icon">&#x1F3E0;</span> Dashboard
                </a>
                <a href="/create" class="nav-item {% block nav_create %}{% endblock %}">
                    <span class="nav-icon">&#x2795;</span> Create Agent
                </a>
                <a href="/gallery" class="nav-item {% block nav_gallery %}{% endblock %}">
                    <span class="nav-icon">&#x1F4CB;</span> Templates
                </a>
                <a href="/store" class="nav-item {% block nav_store %}{% endblock %}">
                    <span class="nav-icon">&#x1F6D2;</span> Store
                </a>
            </div>

            <div class="nav-group">
                <div class="nav-group-label">Tools</div>
                <a href="/playground" class="nav-item {% block nav_playground %}{% endblock %}">
                    <span class="nav-icon">&#x1F3AE;</span> Playground
                </a>
                <a href="/builder" class="nav-item {% block nav_builder %}{% endblock %}">
                    <span class="nav-icon">&#x1F527;</span> Builder
                </a>
            </div>

            <div class="nav-group">
                <div class="nav-group-label">Monitor</div>
                <a href="/logs" class="nav-item {% block nav_logs %}{% endblock %}">
                    <span class="nav-icon">&#x1F4DC;</span> Logs
                </a>
                <a href="/analytics" class="nav-item {% block nav_analytics %}{% endblock %}">
                    <span class="nav-icon">&#x1F4CA;</span> Analytics
                </a>
                <a href="/traces" class="nav-item {% block nav_traces %}{% endblock %}">
                    <span class="nav-icon">&#x1F50D;</span> Traces
                </a>
            </div>

            <div class="nav-group">
                <div class="nav-group-label">Advanced</div>
                <a href="/debugger" class="nav-item {% block nav_debugger %}{% endblock %}">
                    <span class="nav-icon">&#x1F41B;</span> Debugger
                </a>
                <a href="/dependencies" class="nav-item {% block nav_dependencies %}{% endblock %}">
                    <span class="nav-icon">&#x1F517;</span> Dependencies
                </a>
                <a href="/settings" class="nav-item {% block nav_settings %}{% endblock %}">
                    <span class="nav-icon">&#x2699;</span> Settings
                </a>
            </div>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script src="/static/app.js"></script>
    <script>
        // --- Sidebar Toggle (mobile) ---
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }
        // Close sidebar on content click (mobile)
        document.querySelector('.main-content').addEventListener('click', () => {
            document.getElementById('sidebar').classList.remove('open');
        });

        // --- Notification System ---
        let notifDropdownOpen = false;

        function toggleNotifDropdown() {
            notifDropdownOpen = !notifDropdownOpen;
            document.getElementById('notif-dropdown').style.display = notifDropdownOpen ? 'block' : 'none';
            if (notifDropdownOpen) loadNotifications();
        }

        document.addEventListener('click', function(e) {
            const bell = document.getElementById('notif-bell');
            if (bell && !bell.contains(e.target) && notifDropdownOpen) {
                notifDropdownOpen = false;
                document.getElementById('notif-dropdown').style.display = 'none';
            }
        });

        async function loadNotifications() {
            try {
                const data = await apiCall('/api/notifications?limit=20');
                if (!data.ok) return;
                const list = document.getElementById('notif-list');
                const notifications = data.notifications || [];
                if (notifications.length === 0) {
                    list.innerHTML = '<div class="notif-empty">No notifications</div>';
                    return;
                }
                list.innerHTML = notifications.map(n => {
                    const typeIcons = { completed: '&#x2705;', approval: '&#x1F6A8;', error: '&#x274C;', info: '&#x2139;' };
                    const icon = typeIcons[n.type] || '&#x2139;';
                    const bg = n.read ? 'transparent' : 'var(--bg-secondary)';
                    return `
                        <div class="notif-item" style="background:${bg}" onclick="markNotifRead(this.dataset.nid, this)" data-nid="${escapeHtml(String(n.id))}">
                            <span class="notif-icon">${icon}</span>
                            <div class="notif-body">
                                <div class="notif-agent">${escapeHtml(n.agent_name)}</div>
                                <div class="notif-msg">${escapeHtml(n.message).substring(0, 80)}</div>
                            </div>
                        </div>`;
                }).join('');
            } catch(e) {}
        }

        async function updateNotifBadge() {
            try {
                const data = await apiCall('/api/notifications?unread_only=true&limit=1');
                const badge = document.getElementById('notif-badge');
                const count = data.unread_count || 0;
                badge.style.display = count > 0 ? 'flex' : 'none';
                badge.textContent = count > 99 ? '99+' : count;
            } catch(e) {}
        }

        async function markNotifRead(id, el) {
            try {
                await apiCall(`/api/notifications/${id}/read`, { method: 'POST' });
                if (el) el.style.background = 'transparent';
                updateNotifBadge();
            } catch(e) {}
        }

        async function markAllNotifRead(e) {
            if (e) { e.stopPropagation(); e.preventDefault(); }
            try {
                await apiCall('/api/notifications/read-all', { method: 'POST' });
                loadNotifications();
                updateNotifBadge();
            } catch(e) {}
        }

        updateNotifBadge();
        setInterval(updateNotifBadge, 10000);
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
