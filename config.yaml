version: 1
api_port: 8080
web_port: 3000
default_model: "nvidia/nemotron-3-super-120b-a12b:free"
ollama_url: "http://localhost:11434"
max_concurrent_agents: 5
agent_timeout_seconds: 300
storage_path: "~/.pagal-os"

# Telegram bot configuration
telegram:
  bot_token: ${TELEGRAM_BOT_TOKEN}
  default_agent: research_agent

# MCP (Model Context Protocol) configuration
mcp:
  server_port: 18790
  clients: []  # external MCP servers to connect to on startup

# Agent-to-Agent (A2A) protocol configuration
a2a:
  port: 18791
  auth_token: ${A2A_AUTH_TOKEN}
  remote_agents: {}  # agent_name -> url mappings

# Voice agent interface
voice:
  stt_api_key: ${STT_API_KEY}
  stt_api_base: "https://api.groq.com/openai/v1"
  stt_model: "whisper-large-v3-turbo"
  tts_voice: "en-US-AriaNeural"

# Encryption at rest
encryption:
  enabled: true

# Budget defaults (per agent)
budget:
  daily_limit_usd: 1.00
  monthly_limit_usd: 10.00
  per_run_limit_usd: 0.10

# Rate limiting defaults (per agent)
rate_limit:
  per_minute: 30
  per_hour: 500
